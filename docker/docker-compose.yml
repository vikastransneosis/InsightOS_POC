version: "3.9"
services:

  # Optional: Qdrant for future use with Python 3.11–3.13 + llama-index-vector-stores-qdrant.
  # Default POC uses embedded Chroma (storage/chroma volume on api).
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports: ["6333:6333", "6334:6334"]
  #   volumes: ["../data/qdrant:/qdrant/storage"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/insightos_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ../data/neo4j:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: insightos_secret
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      - ../documents:/app/documents
      - ../storage:/app/storage
